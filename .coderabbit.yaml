reviews:
  profile: chill
  high_level_summary: true
  review_status: true

  path_filters:
    - '!**/.next/**'
    - '!**/node_modules/**'
    - '!**/coverage/**'
    - '!**/dist/**'
    - '!**/build/**'

  path_instructions:
    - path: 'client/src/app/**'
      instructions: |
        Focus on readability, accessibility, and Next.js App Router best practices.

    - path: 'server/**'
      instructions: |
        Focus on simplicity, clear API structure, and avoiding overengineering.

    - path: '.github/workflows/**'
      instructions: |
        Focus on CI reliability and simplicity.
