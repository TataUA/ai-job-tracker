reviews:
  profile: chill
  high_level_summary: true
  review_status: true

  path_filters:
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"

  path_instructions:
    - path: "src/app/**"
      instructions: |
        Focus on readability, accessibility, and Next.js App Router best practices.
    - path: ".github/workflows/**"
      instructions: |
        Focus on CI reliability and simplicity.